name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0.
        required: true
        default: v0.1.0
      build_number:
        description: Android versionCode.
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  android-release:
    name: Android Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Write signing files
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64}"
          test -n "${ANDROID_KEYSTORE_PASSWORD}"
          test -n "${ANDROID_KEY_ALIAS}"
          test -n "${ANDROID_KEY_PASSWORD}"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/release.keystore
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=../release.keystore
          EOF
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android release APK
        run: |
          VERSION_NAME="${TAG#v}"
          flutter build apk --release --build-name "${VERSION_NAME}" --build-number "${BUILD_NUMBER}"
          cp build/app/outputs/flutter-apk/app-release.apk "phi-res-extract-${TAG}-android-release.apk"
        env:
          TAG: ${{ inputs.tag }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          GRADLE_USER_HOME: ~/.gradle

      - name: Upload Android release APK
        uses: actions/upload-artifact@v4
        with:
          name: phi-res-extract-android-release
          path: phi-res-extract-${{ inputs.tag }}-android-release.apk

  linux-release:
    name: Linux Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Linux release bundle
        run: |
          flutter build linux --release
          (cd build/linux/x64/release/bundle && zip -r "${GITHUB_WORKSPACE}/phi-res-extract-${TAG}-linux-x64.zip" .)
        env:
          TAG: ${{ inputs.tag }}

      - name: Upload Linux release bundle
        uses: actions/upload-artifact@v4
        with:
          name: phi-res-extract-linux-release
          path: phi-res-extract-${{ inputs.tag }}-linux-x64.zip

  publish-release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs:
      - android-release
      - linux-release
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Download APK metadata JSON
        run: |
          curl --fail --location --show-error \
            https://github.com/Edward334/Phi_Res_Extract/releases/download/apk-latest/taptap-apk.json \
            --output dist/taptap-apk.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Phi Res Extract ${{ inputs.tag }}
          body: |
            Release builds for Phi Res Extract.

            These builds do not bundle TapTap, the Phigros APK, charts, illustrations, or music. The app downloads the official APK at runtime from the lightweight metadata JSON and extracts resources on device.

            Assets:
            - Android release APK
            - Linux x64 release bundle
            - `taptap-apk.json`, copied from the lightweight `apk-latest` metadata release

            Launcher icon source: original project artwork in `assets/branding/app_icon.svg`; no third-party or commercial icon assets are used.
          files: |
            dist/phi-res-extract-${{ inputs.tag }}-android-release.apk
            dist/phi-res-extract-${{ inputs.tag }}-linux-x64.zip
            dist/taptap-apk.json
          make_latest: true
          overwrite_files: true
