name: Resource Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  resources:
    name: Build resources from TapTap
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Download and extract TapTap APK
        run: python tools/phigros_updater.py update --out .phigros_library

      - name: Validate resource library
        run: python tools/validate_library.py --library .phigros_library

      - name: Pack app resource bundle
        run: |
          cd .phigros_library
          zip -9 -r ../phigros-library.zip catalog chart illustration music manifest.json
          cd ..
          sha256sum phigros-library.zip > phigros-library.sha256

      - name: Publish resource bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resources-latest
          name: Phigros Resource Bundle
          body: |
            Generated by GitHub Actions from the latest TapTap APK.
            The Android app downloads this bundle on first use.
          files: |
            phigros-library.zip
            phigros-library.sha256
          make_latest: false
          overwrite_files: true
